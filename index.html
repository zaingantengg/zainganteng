<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing - Decrypting Message</title>
    <style>
        /* Gaya Dasar Terminal Cyber */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0206;
            color: #ff3366;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* Kontainer Utama */
        #terminal-container {
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 600px;
        }

        /* Baris Teks Konsol */
        .console-log {
            font-size: 16px;
            margin: 10px 0;
            line-height: 1.5;
            color: #ff3366;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.6);
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tombol Dekripsi Cyber */
        #decrypt-btn {
            background: transparent;
            color: #ff3366;
            border: 2px solid #ff3366;
            padding: 12px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            transition: all 0.3s ease;
            margin-top: 25px;
            display: none;
            text-transform: uppercase;
        }

        #decrypt-btn:hover {
            background-color: #ff3366;
            color: #0b0206;
            box-shadow: 0 0 25px #ff3366;
        }

        /* Kanvas Tempat Partikel Hati Dibentuk */
        #heart-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: none;
        }

        /* Teks Mengambang Tambahan di Akhir */
        #watermark {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            letter-spacing: 4px;
            opacity: 0.4;
            color: #ff85a1;
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://files.catbox.moe/6v3ofk.mp3" type="audio/mp3">
    </audio>

    <div id="terminal-container">
        <div id="log-box"></div>
        <button id="decrypt-btn" onclick="startHeartMatrix()">🔓 Decrypt Message</button>
    </div>

    <canvas id="heart-canvas"></canvas>

    <div id="watermark">APOLOGY PROTOCOL V2.0</div>

    <script>
        const logBox = document.getElementById('log-box');
        const decryptBtn = document.getElementById('decrypt-btn');
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');

        // Rentetan Teks Pembuka ala Terminal Sistem
        const systemMessages = [
            "[system] Initializing heart.PROTOCOL_v2.0...",
            "[status] Scanning core emotional sectors...",
            "[database] Found: 1 Encrypted package from sender.",
            "[security] Security bypass required to extract contents."
        ];

        // Efek Memunculkan Teks Satu per Satu
        let msgIndex = 0;
        function printNextMessage() {
            if (msgIndex < systemMessages.length) {
                const div = document.createElement('div');
                div.className = 'console-log';
                div.innerText = systemMessages[msgIndex];
                logBox.appendChild(div);
                msgIndex++;
                setTimeout(printNextMessage, 800);
            } else {
                decryptBtn.style.display = 'inline-block';
                decryptBtn.style.animation = 'fadeInUp 0.5s forwards';
            }
        }

        window.onload = printNextMessage;

        // --- SISTEM PEMBENTUKAN MATRIKS JANTUNG ---
        let particles = [];
        
        // Teks utama yang sudah diganti sesuai permintaan Anda
        const wordsPool = ["maafin kaka ya dd"];

        function startHeartMatrix() {
            document.getElementById('bg-music').play().catch(e => console.log("Music blocked"));

            document.getElementById('terminal-container').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('watermark').style.display = 'block';

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            generateHeartPoints();
            animate();
        }

        // Algoritma Matematika Persamaan Jantung
        function generateHeartPoints() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Pengondisian ukuran bentuk jantung agar responsif di HP/Laptop
            const scaleFactor = Math.min(canvas.width, canvas.height) * 0.022; 

            // Looping koordinat untuk merangkai bentuk pola hati raksasa
            for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = 13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle);

                const targetX = centerX + (x * scaleFactor);
                const targetY = centerY - (y * scaleFactor);

                particles.push({
                    currentX: Math.random() * canvas.width,
                    currentY: Math.random() * canvas.height,
                    targetX: targetX,
                    targetY: targetY,
                    text: wordsPool[0], // Menggunakan teks "maafin kaka ya dd"
                    fontSize: Math.random() * 3 + 11, 
                    speed: Math.random() * 0.03 + 0.015, 
                    color: getRandomPinkTone()
                });
            }
        }

        function getRandomPinkTone() {
            const shades = ['#ff2a6d', '#ff0055', '#ff5e97', '#f72585', '#b5179e'];
            return shades[Math.floor(Math.random() * shades.length)];
        }

        function animate() {
            ctx.fillStyle = 'rgba(11, 2, 6, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.currentX += (p.targetX - p.currentX) * p.speed;
                p.currentY += (p.targetY - p.currentY) * p.speed;

                ctx.fillStyle = p.color;
                ctx.font = `bold ${p.fontSize}px 'Courier New', monospace`;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 8;
                
                ctx.fillText(p.text, p.currentX, p.currentY);
            });

            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            if (canvas.style.display === 'block') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                particles = [];
                generateHeartPoints();
            }
        });
    </script>
</body>
</html>
